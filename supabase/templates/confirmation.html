<div style="background-color:#EFF1F8;padding:32px 16px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="max-width:440px;margin:0 auto;">
    <tr>
      <td style="padding:0 0 16px 0;text-align:center;">
        <span style="display:inline-block;background:linear-gradient(90deg,#5457E8,#7C3AED);background-color:#5457E8;color:#ffffff;font-size:14px;font-weight:600;letter-spacing:0.4px;padding:8px 18px;border-radius:24px;">The Family App</span>
      </td>
    </tr>
    <tr>
      <td style="background-color:#ffffff;border-radius:20px;padding:32px 28px;box-shadow:0 6px 20px rgba(20,26,60,0.12);">
        <h1 style="margin:0 0 8px 0;color:#16192A;font-size:22px;font-weight:700;letter-spacing:-0.4px;">Confirm your email</h1>
        <p style="margin:0 0 24px 0;color:#5F6780;font-size:15px;line-height:1.5;">Welcome to The Family App! Enter this code in the app to verify your email:</p>
        <div style="background-color:#EEF0FF;border-radius:16px;padding:18px 0;text-align:center;">
          <span style="color:#4338CA;font-size:32px;font-weight:700;letter-spacing:8px;font-family:'SF Mono',ui-monospace,Menlo,Consolas,monospace;">{{ .Token }}</span>
        </div>
        <p style="margin:24px 0 0 0;color:#8B92AC;font-size:13px;line-height:1.5;">The code expires in 1 hour. If you didn't create an account, you can safely ignore this email.</p>
      </td>
    </tr>
    <tr>
      <td style="padding:16px 0 0 0;text-align:center;color:#8B92AC;font-size:12px;">Sent by The Family App &middot; thefamilyapp.app</td>
    </tr>
  </table>
</div>
