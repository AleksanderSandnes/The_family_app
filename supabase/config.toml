# Remote auth config, applied with `supabase config push`.
#
# ⚠️ config push has NO dry-run and auto-applies in non-interactive shells.
# Undeclared [auth] top-level fields are pushed as CLI DEFAULTS — every value
# the dashboard manages must be mirrored here or it gets overwritten.
# (External providers, e.g. [auth.external.google], are only touched when
# declared — leave them out so dashboard-managed OAuth credentials survive.)
project_id = "The_family_app"

[auth]
enabled = true
site_url = "http://localhost:3000"
# familyapp://auth is REQUIRED: Google OAuth redirect + auth email links.
additional_redirect_urls = ["familyapp://auth"]

[auth.mfa.totp]
enroll_enabled = true
verify_enabled = true

[auth.email]
enable_signup = true
double_confirm_changes = true
# Signup email confirmation is ON (2026-07-12): the app verifies via the
# 6-digit code on VerifyEmailScreen. Old app versions error at signup until
# updated — accepted trade-off.
enable_confirmations = true

[auth.email.template.recovery]
subject = "Your Family App reset code"
content_path = "./supabase/templates/recovery.html"

[auth.email.template.confirmation]
subject = "Your Family App verification code"
content_path = "./supabase/templates/confirmation.html"

# Resend SMTP — sender domain thefamilyapp.app (verified 2026-07-12).
# The key lives in .envrc (gitignored); a push without it fails loudly.
[auth.email.smtp]
enabled = true
host = "smtp.resend.com"
port = 465
user = "resend"
pass = "env(RESEND_SMTP_KEY)"
admin_email = "auth@thefamilyapp.app"
sender_name = "The Family App"

[auth.rate_limit]
# Resend free tier: 100/day. Raise from the built-in default now that
# delivery goes through verified SMTP.
email_sent = 30
