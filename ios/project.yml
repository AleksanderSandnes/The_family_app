# XcodeGen manifest — the FamilyApp.xcodeproj is generated, never committed.
# On the Mac: `brew install xcodegen && cd ios && xcodegen generate`.
name: FamilyApp
options:
  bundleIdPrefix: com.sandnes
  deploymentTarget:
    iOS: "26.0"
  createIntermediateGroups: true
  developmentLanguage: en
# The app ships English + Norwegian Bokmål localizations; the in-app language picker
# overrides the system language via the root \.locale environment.
knownRegions:
  - en
  - nb
  - Base

configFiles:
  Debug: Config/Shared.xcconfig
  Release: Config/Shared.xcconfig

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: 2.20.0
  Nuke:
    url: https://github.com/kean/Nuke
    from: 12.8.0
  Firebase:
    url: https://github.com/firebase/firebase-ios-sdk
    from: 11.0.0

targets:
  FamilyApp:
    type: application
    platform: iOS
    sources:
      - FamilyApp
    # SwiftLint runs on every build (report-only warnings). It degrades
    # gracefully if the binary is missing (see ../LINTING.md). Config lives at
    # the repo root (.swiftlint.yml); the script cd's up from $SRCROOT (= ios/).
    # NOTE: re-run `cd ios && xcodegen generate` after editing this manifest.
    preBuildScripts:
      - name: SwiftLint
        basedOnDependencyAnalysis: false
        script: |
          export PATH="$PATH:/opt/homebrew/bin:/usr/local/bin"
          if which swiftlint >/dev/null; then
            # Report-only: never fail the build on lint violations (see ../LINTING.md).
            cd "$SRCROOT/.." && swiftlint lint --quiet || true
          else
            echo "warning: SwiftLint not installed — run 'brew install swiftlint' (see ios/LINTING.md)"
          fi
    dependencies:
      - package: Supabase
        product: Supabase
      - package: Nuke
        product: Nuke
      - package: Nuke
        product: NukeUI
      - package: Firebase
        product: FirebaseMessaging
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sandnes.familyapp
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "5.10"
        ENABLE_USER_SCRIPT_SANDBOXING: YES
        # DEVELOPMENT_TEAM is set locally in Xcode (Signing & Capabilities) — not committed.
    scheme:
      testTargets:
        - FamilyAppTests
      gatherCoverageData: true
    # NOTE: the aps-environment (Push Notifications) entitlement is disabled for local
    # dev builds because a FREE personal Apple team cannot provision it. Restore this
    # block once enrolled in the paid Apple Developer Program (and add
    # FamilyApp/Resources/GoogleService-Info.plist) to enable push:
    # entitlements:
    #   path: FamilyApp/FamilyApp.entitlements
    #   properties:
    #     # Xcode flips this to `production` automatically for App Store builds.
    #     aps-environment: development
    info:
      path: FamilyApp/Info.plist
      properties:
        CFBundleDisplayName: The Family App
        CFBundleLocalizations:
          - en
          - nb
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        CFBundleURLTypes:
          - CFBundleURLName: com.sandnes.familyapp
            CFBundleURLSchemes:
              - familyapp
        NSCameraUsageDescription: Take photos for your profile, family, chat messages and wishes.
        NSMicrophoneUsageDescription: Record voice messages in family chat.
        NSPhotoLibraryUsageDescription: Choose photos for your profile, family, chat messages and wishes.
        NSPhotoLibraryAddUsageDescription: Save chat photos to your photo library.
        NSLocationWhenInUseUsageDescription: Share your live location with your family on the family map.
        NSLocationAlwaysAndWhenInUseUsageDescription: Keep sharing your location with your family while the app is in the background.
        UIBackgroundModes:
          - location
          - remote-notification
        ITSAppUsesNonExemptEncryption: false
        # Injected from Config/Secrets.xcconfig via Shared.xcconfig — read by SupabaseClientProvider.
        SUPABASE_URL: $(SUPABASE_URL)
        SUPABASE_ANON_KEY: $(SUPABASE_ANON_KEY)

  FamilyAppTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - FamilyAppTests
    dependencies:
      - target: FamilyApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sandnes.familyapp.tests
        SWIFT_VERSION: "5.10"
        GENERATE_INFOPLIST_FILE: YES
