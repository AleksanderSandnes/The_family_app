# XcodeGen manifest — the FamilyApp.xcodeproj is generated, never committed.
# On the Mac: `brew install xcodegen && cd ios && xcodegen generate`.
name: FamilyApp
options:
  bundleIdPrefix: com.sandnes
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

configFiles:
  Debug: Config/Shared.xcconfig
  Release: Config/Shared.xcconfig

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: 2.20.0
  Nuke:
    url: https://github.com/kean/Nuke
    from: 12.8.0

targets:
  FamilyApp:
    type: application
    platform: iOS
    sources:
      - FamilyApp
    dependencies:
      - package: Supabase
        product: Supabase
      - package: Nuke
        product: Nuke
      - package: Nuke
        product: NukeUI
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sandnes.familyapp
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "5.10"
        ENABLE_USER_SCRIPT_SANDBOXING: YES
        # DEVELOPMENT_TEAM is set locally in Xcode (Signing & Capabilities) — not committed.
    scheme:
      testTargets:
        - FamilyAppTests
      gatherCoverageData: true
    info:
      path: FamilyApp/Info.plist
      properties:
        CFBundleDisplayName: The Family App
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        CFBundleURLTypes:
          - CFBundleURLName: com.sandnes.familyapp
            CFBundleURLSchemes:
              - familyapp
        NSCameraUsageDescription: Take photos for your profile, family, chat messages and wishes.
        NSMicrophoneUsageDescription: Record voice messages in family chat.
        NSPhotoLibraryUsageDescription: Choose photos for your profile, family, chat messages and wishes.
        NSLocationWhenInUseUsageDescription: Share your live location with your family on the family map.
        NSLocationAlwaysAndWhenInUseUsageDescription: Keep sharing your location with your family while the app is in the background.
        UIBackgroundModes:
          - location
          - remote-notification
        ITSAppUsesNonExemptEncryption: false
        # Injected from Config/Secrets.xcconfig via Shared.xcconfig — read by SupabaseClientProvider.
        SUPABASE_URL: $(SUPABASE_URL)
        SUPABASE_ANON_KEY: $(SUPABASE_ANON_KEY)

  FamilyAppTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - FamilyAppTests
    dependencies:
      - target: FamilyApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sandnes.familyapp.tests
        SWIFT_VERSION: "5.10"
