appId: com.sandnes.familyapp
tags:
  - smoke
  - map
---
# Family Map: opens and shows the "On the map" roster.
- launchApp:
    appId: com.sandnes.familyapp
- assertVisible: "Quick access"
- scrollUntilVisible:
    element: "See where everyone is"
    direction: DOWN
- tapOn: "See where everyone is"
- assertVisible: "Family Map"
- assertVisible: "On the map"
