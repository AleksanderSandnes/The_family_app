name: Android Lint

# Lint + unit-test gate for the Android app (android/ tree only). Mirrors swift-lint.yml
# for the iOS side. Runs on pushes to the long-lived branches and on PRs that target them.
# (Per project rule: pushes only ever land on test / main / master.)
on:
  push:
    branches: [test, main, master]
    paths:
      - "android/**"
      - ".github/workflows/android-lint.yml"
  pull_request:
    branches: [test, main, master]
    paths:
      - "android/**"
      - ".github/workflows/android-lint.yml"

# Cancel superseded runs on the same ref.
concurrency:
  group: android-lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Spotless + detekt + Android lint + unit tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: android
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # Provide the placeholders BuildConfig/manifest need so :app configures without
      # the gitignored local.properties. Real secrets are never needed for lint/test.
      - name: Write placeholder local.properties
        run: |
          {
            echo "SUPABASE_URL=https://placeholder.supabase.co"
            echo "SUPABASE_ANON_KEY=placeholder-anon-key"
            echo "MAPS_API_KEY=placeholder"
          } > local.properties

      # HARD gate — Spotless (ktlint) formatting check. Never writes in CI.
      - name: Spotless (check only)
        run: ./gradlew spotlessCheck --no-daemon

      # HARD gate — detekt static analysis (maxIssues: 0, baseline for legacy debt).
      - name: detekt
        run: ./gradlew detekt --no-daemon

      # HARD gate — Android lint on the debug variant.
      - name: Android lint
        run: ./gradlew lintDebug --no-daemon

      # HARD gate — JVM unit tests.
      - name: Unit tests
        run: ./gradlew testDebugUnitTest --no-daemon
